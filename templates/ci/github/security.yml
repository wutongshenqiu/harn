name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
{% if primary_language == "rust" %}
      - uses: dtolnay/rust-toolchain@stable
{% elif primary_language == "go" %}
      - uses: actions/setup-go@v5
        with:
          go-version: stable
{% elif primary_language == "typescript" or primary_language == "javascript" %}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
{% elif primary_language == "python" %}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
{% elif primary_language == "java" %}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
{% endif %}
      - uses: github/codeql-action/init@v3
        with:
{% if primary_language == "typescript" or primary_language == "javascript" %}
          languages: javascript-typescript
{% elif primary_language == "java" %}
          languages: java-kotlin
{% elif primary_language == "python" or primary_language == "go" or primary_language == "rust" or primary_language == "cpp" %}
          languages: {{ primary_language }}
{% else %}
          languages: {{ primary_language }}
{% endif %}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
