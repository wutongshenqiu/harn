name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
{% if primary_language == "rust" %}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
{% elif primary_language == "go" %}
      - uses: actions/setup-go@v5
        with:
          go-version: stable
{% elif primary_language == "typescript" or primary_language == "javascript" %}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
{% elif primary_language == "python" %}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
{% elif primary_language == "java" %}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
{% elif primary_language == "dart" %}
      - uses: dart-lang/setup-dart@v1
{% endif %}
      - name: Lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
{% if primary_language == "rust" %}
      - uses: dtolnay/rust-toolchain@stable
{% elif primary_language == "go" %}
      - uses: actions/setup-go@v5
        with:
          go-version: stable
{% elif primary_language == "typescript" or primary_language == "javascript" %}
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
{% elif primary_language == "python" %}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
{% elif primary_language == "java" %}
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
{% elif primary_language == "dart" %}
      - uses: dart-lang/setup-dart@v1
{% endif %}
      - name: Test
        run: make test

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check
        run: |
          if [[ "${{ '{{' }} needs.lint.result {{ '}}' }}" != "success" ]] || \
             [[ "${{ '{{' }} needs.test.result {{ '}}' }}" != "success" ]]; then
            exit 1
          fi
