name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: make test

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check
        run: |
          if [[ "${{ '{{' }} needs.lint.result {{ '}}' }}" != "success" ]] || \
             [[ "${{ '{{' }} needs.test.result {{ '}}' }}" != "success" ]]; then
            exit 1
          fi
